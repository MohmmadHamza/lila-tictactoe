version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: nakama-postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdbpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nakama:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: nakama
    depends_on:
      - postgres
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up --database.address postgres:localdbpassword@postgres:5432/nakama &&
        exec /nakama/nakama
        --name nakama1
        --database.address postgres:localdbpassword@postgres:5432/nakama
        --logger.level DEBUG
        --runtime.path /nakama/data/modules
        --runtime.js_entrypoint build/index.js
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    restart: unless-stopped

volumes:
  postgres_data: